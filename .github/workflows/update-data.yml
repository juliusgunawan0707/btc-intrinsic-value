name: Update BTC data daily

on:
  schedule:
    - cron: '15 0 * * *'  # 08:15 WITA (00:15 UTC) setiap hari
  workflow_dispatch:  # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Fetch & generate data
        run: python fetch_data.py

      - name: Commit & push if changed
        run: |
          git config user.name "BTC Data Bot"
          git config user.email "noreply@github.com"
          if git diff --quiet data.js; then
            echo "No changes to data.js, skipping commit"
          else
            git add data.js
            git commit -m "chore: update BTC data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
