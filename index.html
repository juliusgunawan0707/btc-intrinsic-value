<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BTC — Harga vs Nilai Intrinsik</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --bg:#0b0f19; --panel:#121829; --line:#1f2940; --txt:#e6ebf5; --mut:#8a95ad;
    --spot:#f7931a; --realized:#4da3ff; --floor:#3ddc97; --accent:#f7931a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font-family:'Segoe UI',system-ui,sans-serif;padding:18px}
  h1{font-size:19px;margin:0 0 2px}
  .sub{color:var(--mut);font-size:12px;margin-bottom:14px}
  .wrap{max-width:1080px;margin:0 auto}
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
        padding:10px 14px;min-width:130px}
  .card .lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .card .val{font-size:20px;font-weight:700;margin-top:3px}
  .verdict{padding:10px 14px;border-radius:10px;font-weight:600;font-size:14px;
           border:1px solid var(--line);background:var(--panel)}
  .toolbar{display:flex;gap:6px;align-items:center;margin:12px 0;flex-wrap:wrap}
  .tf{background:var(--panel);color:var(--mut);border:1px solid var(--line);
      padding:6px 12px;border-radius:7px;cursor:pointer;font-size:13px}
  .tf.active{background:var(--accent);color:#0b0f19;border-color:var(--accent);font-weight:700}
  .legend{display:flex;gap:16px;margin:8px 0 4px;font-size:12px;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:11px;height:3px;border-radius:2px;display:inline-block}
  #hud{display:flex;gap:14px;flex-wrap:wrap;align-items:center;background:var(--panel);
       border:1px solid var(--line);border-radius:9px;padding:9px 13px;margin-bottom:8px;
       font-size:13px;font-variant-numeric:tabular-nums;min-height:40px}
  #hud .h-date{font-weight:700;color:var(--txt);margin-right:2px}
  #hud .h-item{display:inline-flex;align-items:center;gap:5px;color:var(--mut)}
  #hud .h-item b{color:var(--txt);font-weight:700}
  #hud .h-dot{width:8px;height:8px;border-radius:50%}
  #hud .up{color:#3ddc97;font-weight:700} #hud .down{color:#ff5c5c}
  #hud .h-sub{color:var(--mut);font-size:11px}
  #chart{height:430px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  #mvrv{height:130px;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:8px}
  .foot{color:var(--mut);font-size:11px;margin-top:10px;line-height:1.6}
  .pill{padding:2px 8px;border-radius:20px;font-size:12px;font-weight:700}
  .help{cursor:help;color:var(--mut);font-size:9px;font-weight:700;margin-left:2px;position:relative;
         display:inline-block;width:14px;height:14px;line-height:14px;text-align:center;
         border-radius:50%;background:rgba(138,149,173,.2);vertical-align:middle}
  .help:hover{color:var(--accent);background:rgba(247,147,26,.2)}
  .help:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
                     width:160px;background:var(--line);border:1px solid var(--accent);border-radius:6px;padding:8px;
                     font-size:11px;font-weight:400;color:var(--txt);z-index:999;white-space:normal;
                     box-shadow:0 4px 12px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div class="wrap">
  <h1>₿ Bitcoin — Harga vs Nilai Intrinsik</h1>
  <div class="sub" id="sub">memuat…</div>

  <div class="cards">
    <div class="card"><div class="lbl">Spot <span class="help" data-tip="Harga pasar BTC saat ini">?</span></div><div class="val" id="c-spot" style="color:var(--spot)">—</div></div>
    <div class="card"><div class="lbl">Realized Price <span class="help" data-tip="Cost basis rata-rata jaringan — harga beli rata-rata semua BTC">?</span></div><div class="val" id="c-real" style="color:var(--realized)">—</div></div>
    <div class="card"><div class="lbl">Floor Produksi <span class="help" data-tip="Perkiraan biaya listrik buat tambang 1 BTC — lantai hard downside">?</span></div><div class="val" id="c-floor" style="color:var(--floor)">—</div></div>
    <div class="card"><div class="lbl">MVRV <span class="help" data-tip="Market Cap / Realized Cap — rasio valuasi (>1 premium, <1 diskon)">?</span></div><div class="val" id="c-mvrv">—</div></div>
    <div class="card"><div class="lbl">Avg Premium <span class="help" data-tip="Rata-rata premium dari semua (all-time), 2 tahun, 1 tahun, 90 hari terakhir">?</span></div><div class="val" id="c-avgprem" style="font-size:14px">—</div></div>
    <div class="card verdict" style="flex:1;min-width:240px;display:flex;flex-direction:column;justify-content:center">
      <div class="lbl" style="color:var(--mut);font-size:11px">SINYAL AKUMULASI</div>
      <div id="verdict" style="margin-top:4px">—</div>
    </div>
  </div>

  <div class="toolbar" id="tfbar">
    <span style="color:var(--mut);font-size:12px;margin-right:4px">Rentang:</span>
    <button class="tf" data-d="90">3B</button>
    <button class="tf" data-d="365">1T</button>
    <button class="tf" data-d="730">2T</button>
    <button class="tf active" data-d="0">ALL</button>
  </div>

  <div class="legend">
    <span><i class="dot" style="background:var(--spot)"></i>Harga Spot <span class="help" data-tip="Harga pasar BTC realtime">?</span></span>
    <span><i class="dot" style="background:var(--realized)"></i>Realized Price <span class="help" data-tip="Cost basis jaringan — harga beli rata-rata semua BTC di blockchain">?</span></span>
    <span><i class="dot" style="background:var(--floor)"></i>Floor Produksi <span class="help" data-tip="Biaya listrik rata-rata tambang — lantai hard, bukan target harga">?</span></span>
  </div>
  <div id="hud">arahkan kursor ke grafik untuk melihat nilai per tanggal…</div>
  <div id="chart"></div>
  <div class="legend" style="margin-top:10px"><span><i class="dot" style="background:#b18cff"></i>MVRV — zona valuasi</span></div>
  <div id="mvrv"></div>

  <div class="foot" id="foot"></div>
</div>

<script src="data.js"></script>
<script>
const D = window.BTC_DATA;
const S = D.series;
const fmt = n => n==null ? '—' : '$'+Math.round(n).toLocaleString('en-US');

// ---- charts ----
const common = {
  layout:{background:{color:'transparent'},textColor:'#8a95ad'},
  grid:{vertLines:{color:'#1f2940'},horzLines:{color:'#1f2940'}},
  rightPriceScale:{borderColor:'#1f2940'},
  timeScale:{borderColor:'#1f2940'},
  crosshair:{mode:0},
};
const chart = LightweightCharts.createChart(document.getElementById('chart'),
  {...common, height:430, localization:{priceFormatter:fmt}});
chart.priceScale('right').applyOptions({mode:1}); // log scale

const spot = chart.addLineSeries({color:getCSS('--spot'),lineWidth:2,title:'Spot'});
const real = chart.addLineSeries({color:getCSS('--realized'),lineWidth:2,title:'Realized'});
const floor= chart.addLineSeries({color:getCSS('--floor'),lineWidth:2,title:'Floor'});

// haluskan mining floor (MA 30 hari) — floor adalah tren biaya, bukan noise harian
function sma(arr,key,win){
  const out=[]; let sum=0, q=[];
  for(const r of arr){
    const v=r[key]; if(v==null){continue;}
    q.push(v); sum+=v; if(q.length>win)sum-=q.shift();
    out.push({time:r.t,value:sum/q.length});
  }
  return out;
}
spot.setData(S.map(r=>({time:r.t,value:r.price})));
real.setData(S.map(r=>({time:r.t,value:r.realized})));
floor.setData(sma(S,'floor',30));

const mchart = LightweightCharts.createChart(document.getElementById('mvrv'),{...common,height:130});
const mvrv = mchart.addLineSeries({color:'#b18cff',lineWidth:2});
mvrv.setData(S.map(r=>({time:r.t,value:r.mvrv})));
// garis zona MVRV
[[1,'#3ddc97','wajar'],[2.4,'#f7c948','premium'],[3.7,'#ff5c5c','euforia']].forEach(([v,c])=>{
  mvrv.createPriceLine({price:v,color:c,lineWidth:1,lineStyle:2,axisLabelVisible:true,title:String(v)});
});

// ---- HUD legend per tanggal (ala TradingView) ----
const byDate = {}; S.forEach(r=>byDate[r.t]=r);
const hud = document.getElementById('hud');
// zona valuasi 5-tingkat (berbasis MVRV = Spot/Realized) + aksi
function zoneMVRV(m){
  if(m<1.0) return ['DEEP VALUE','#3ddc97','akumulasi agresif'];
  if(m<1.5) return ['AKUMULASI','#3ddc97','beli bertahap OK'];
  if(m<2.4) return ['WAJAR / HOLD','#4da3ff','tahan, beli selektif'];
  if(m<3.2) return ['MAHAL','#f7c948','kurangi agresivitas'];
  return ['EUFORIA','#ff5c5c','distribusi / hindari'];
}
function pct(a,b){ // a vs b, +/-
  const v=(a/b-1)*100, s=v>=0?'+':'';
  const cls=v>=0?'up':'down';
  return `<span class="${cls}">${s}${v.toFixed(1)}%</span>`;
}
// satu field adaptif: MoS positif (diskon) atau Premium (di atas cost basis)
function mosField(r){
  const mos=(r.realized-r.price)/r.realized*100;
  if(mos>=0)
    return `<span class="up">Margin of Safety +${mos.toFixed(1)}%</span>`;
  return `<span style="color:#f7c948;font-weight:700">Premium +${(-mos).toFixed(1)}%</span>`
       + ` <span class="h-sub">(MoS −${(-mos).toFixed(1)}%)</span>`;
}
function updateHUD(r){
  if(!r){ hud.innerHTML='arahkan kursor ke grafik untuk melihat nilai per tanggal…'; return; }
  const [z,zc,act]=zoneMVRV(r.mvrv);
  const floorTxt = r.floor ? `<b>${fmt(r.floor)}</b> <span class="down">${pct(r.floor,r.price)}</span>` : '<b>—</b>';
  hud.innerHTML =
    `<span class="h-date">${r.t}</span>`+
    `<span class="h-item"><i class="h-dot" style="background:var(--spot)"></i>Spot <b>${fmt(r.price)}</b></span>`+
    `<span class="h-item"><i class="h-dot" style="background:var(--realized)"></i>Realized <b>${fmt(r.realized)}</b> · ${mosField(r)}</span>`+
    `<span class="h-item"><i class="h-dot" style="background:var(--floor)"></i>Floor Produksi ${floorTxt}</span>`+
    `<span class="h-item"><i class="h-dot" style="background:#b18cff"></i>MVRV <b>${r.mvrv.toFixed(2)}</b> <span style="color:${zc};font-weight:700">${z}</span> <span class="h-sub">· ${act}</span></span>`+
    (r.addr?`<span class="h-item">Active Addresses <b>${Math.round(r.addr).toLocaleString('en-US')}</b></span>`:'');
}
function hudFromParam(p){
  if(p && p.time){ updateHUD(byDate[p.time]); }
  else { updateHUD(D.meta.latest); } // keluar grafik -> tampilkan terkini
}
chart.subscribeCrosshairMove(hudFromParam);
mchart.subscribeCrosshairMove(hudFromParam);
updateHUD(D.meta.latest); // nilai awal = terkini

// sinkron sumbu waktu (dengan guard agar tidak saling memanggil tanpa henti)
let syncing=false;
chart.timeScale().subscribeVisibleLogicalRangeChange(r=>{
  if(syncing||!r)return; syncing=true;
  mchart.timeScale().setVisibleLogicalRange(r); syncing=false;
});
mchart.timeScale().subscribeVisibleLogicalRangeChange(r=>{
  if(syncing||!r)return; syncing=true;
  chart.timeScale().setVisibleLogicalRange(r); syncing=false;
});

// ---- rentang waktu ----
function setRange(days){
  if(days===0){ chart.timeScale().fitContent(); return; }
  const to = S[S.length-1].t;
  const from = S[Math.max(0,S.length-1-days)].t;
  chart.timeScale().setVisibleRange({from,to});
}
document.querySelectorAll('.tf').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tf').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); setRange(+b.dataset.d);
});
chart.timeScale().fitContent();

// ---- kartu + verdict ----
const L = D.meta.latest;
document.getElementById('c-spot').textContent  = fmt(L.price);
document.getElementById('c-real').textContent  = fmt(L.realized);
document.getElementById('c-floor').textContent = fmt(L.floor);
document.getElementById('c-mvrv').textContent  = L.mvrv.toFixed(2);
document.getElementById('sub').textContent =
  `${D.meta.n} hari · ${D.meta.range[0]} → ${D.meta.range[1]} · sumber: ${D.meta.source} · update ${D.meta.generated}`;

// ---- hitung average premium (semua periode) ----
function avgPremium(days) {
  const cutoff = days===0 ? S[0].t : S[S.length-1-Math.min(S.length-1,days)].t;
  const filtered = S.filter(r => r.t >= cutoff);
  const prems = filtered.map(r => (r.price/r.realized-1)*100);
  return prems.length > 0 ? prems.reduce((a,b)=>a+b)/prems.length : 0;
}
const avgAll = avgPremium(0);      // semua
const avg2Y = avgPremium(730);     // 2 tahun
const avg1Y = avgPremium(365);     // 1 tahun
const avg90D = avgPremium(90);     // 90 hari
const avgTxt = `All: ${avgAll.toFixed(1)}% · 2Y: ${avg2Y.toFixed(1)}% · 1Y: ${avg1Y.toFixed(1)}% · 90D: ${avg90D.toFixed(1)}%`;
document.getElementById('c-avgprem').textContent = avgTxt;

const m=L.mvrv;
const [zona,warna,act]=zoneMVRV(m);
const mosNow=(L.realized-L.price)/L.realized*100;
const mosTxt = mosNow>=0
  ? `Margin of Safety <b style="color:#3ddc97">+${mosNow.toFixed(1)}%</b> (di bawah cost basis)`
  : `Premium <b style="color:#f7c948">+${(-mosNow).toFixed(1)}%</b> di atas cost basis — belum ada margin of safety`;
// jarak ke zona MAHAL (MVRV 2.4) dan ke DEEP VALUE (MVRV 1.0)
const priceExpensive = 2.4*L.realized;            // ambang MAHAL
const priceDeepValue = 1.0*L.realized;            // ambang DEEP VALUE
const roomUp  = ((priceExpensive/L.price-1)*100).toFixed(0);
const saran = `${mosTxt}. Aksi: <b>${act}</b>. `+
  `Zona "MAHAL" mulai ~${fmt(priceExpensive)} (+${roomUp}% dari sekarang); `+
  `MoS sejati muncul di bawah ${fmt(priceDeepValue)} (MVRV<1).`;
document.getElementById('verdict').innerHTML =
  `<span class="pill" style="background:${warna};color:#0b0f19">${zona}</span>
   <span style="color:var(--mut);font-size:12px;display:block;margin-top:6px">${saran}</span>`;

const downside = ((L.floor/L.price-1)*100).toFixed(0);
document.getElementById('foot').innerHTML =
  `⚠️ <b>Alert, bukan enforcer</b> — angka deterministik, keputusan tetap di tangan kamu.<br>
   <b>Konsep:</b> <b>Realized Price</b> = harga beli rata-rata semua BTC (cost basis jaringan). <b>Margin of Safety</b> = (Realized−Spot)/Realized:
   positif (+) = harga DI BAWAH cost basis (diskon, Graham zone); negatif (−) = harga DI ATAS cost basis (premium).
   <b>Avg Premium</b> = rata-rata premium per periode (historis vs sekarang). <b>Floor Produksi</b> = biaya tambang rata-rata (eff ${D.meta.params.eff_j_per_th} J/TH, $${D.meta.params.price_per_kwh}/kWh) — lantai hard, bukan target harga.<br>
   <b>Zona valuasi (MVRV):</b> <1 Deep Value | 1–1.5 Akumulasi | 1.5–2.4 Wajar/Hold | 2.4–3.2 Mahal | >3.2 Euforia.
   Jarak sekarang ke Floor Produksi: <b>${downside}%</b> downside. S2F & Rainbow Chart sengaja dihindari (tak punya dasar fundamental).<br>
   <b>Update:</b> Data otomatis harian 08:15 WITA via GitHub Actions. Manual: jalankan <code>python fetch_data.py</code>.`;

function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
</script>
</body>
</html>
